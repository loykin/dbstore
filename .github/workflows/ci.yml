name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26", "stable"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test with race detector
        run: go test -race -count=1 -timeout=120s ./...

  integration:
    name: Integration (Postgres + MySQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Integration tests
        run: go test -v -tags integration -timeout=300s ./internal/store/

  examples:
    name: Test examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Test basic
        working-directory: examples/basic
        run: go test ./... && go run .

      - name: Test multi_db
        working-directory: examples/multi_db
        run: go test ./... && go run .

      - name: Test sqlite_concurrent
        working-directory: examples/sqlite_concurrent
        run: go test ./... && go run .

      - name: Test repository
        working-directory: examples/repository
        run: go test ./...

      - name: Test opensearch
        working-directory: examples/opensearch
        run: go test ./...

      - name: Test elasticsearch
        working-directory: examples/elasticsearch
        run: go test ./... && go run .

      - name: Test rest
        working-directory: examples/rest
        run: go test ./... && go run .

      - name: Test sql_drivers
        working-directory: examples/sql_drivers
        run: go test ./... && go run .

      - name: Test custom_sql_driver
        working-directory: examples/custom_sql_driver
        run: go test ./... && go run .

      - name: Test custom_adapter
        working-directory: examples/custom_adapter
        run: go test ./... && go run .

      - name: Test config
        working-directory: examples/config
        run: go test ./... && go run .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m
